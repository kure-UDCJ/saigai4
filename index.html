<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <title>災害記録 AR（呉）</title>

  <style>
    body { margin: 0; background: #000; }
    model-viewer { width: 100vw; height: 100vh; }

    .controls {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 10;
      user-select: none;
    }
    .btn {
      padding: 12px 16px;
      font-size: 15px;
      border-radius: 10px;
      border: none;
      background: #fff;
      cursor: pointer;
    }
    .btn:active { transform: translateY(1px); }
    .indicator {
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      font-size: 14px;
      min-width: 110px;
      text-align: center;
    }
  </style>
</head>

<body>

    camera-controls
    touch-action="pan-y"
    autoplay
    alt="災害記録 AR モデル">

  <div class="controls">
    <button class="btn" id="prevBtn">前へ</button>
    <div class="indicator" id="pageLabel">Page 1 / 12</div>

    <button class="btn" id="arBtn">ARで表示</button>
